[env:esp32-c3-supermini]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino

monitor_speed = 115200
monitor_filters = direct

lib_deps = 
    olikraus/U8g2@^2.35.30
    bblanchon/ArduinoJson@^7.2.1

build_flags = 
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=0

lib_ldf_mode = deep+
